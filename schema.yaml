  /api/menu/items/:
    get:
      operationId: api_menu_items_list
      description: List all menu items with filtering, searching, and ordering options
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: category_name
        schema:
          type: string
      - in: query
        name: is_available
        schema:
          type: boolean
      - in: query
        name: is_special
        schema:
          type: boolean
      - in: query
        name: is_spicy
        schema:
          type: boolean
      - in: query
        name: is_vegetarian
        schema:
          type: boolean
      - in: query
        name: max_price
        schema:
          type: number
      - in: query
        name: min_price
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
